# ─────────────────────────────────────────────────────────────────────────────
# Climat IA — Configuration NGINX Reverse Proxy
# Résolution DNS Docker : noms de conteneurs résolus par le daemon DNS interne
# ─────────────────────────────────────────────────────────────────────────────

upstream api_backend {
    server api_climat:8000;
    keepalive 32;
}

upstream frontend_backend {
    server frontend_streamlit:8501;
}

server {
    listen 80;
    server_name _;

    # Logging structuré
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # Sécurité — headers HTTP
    add_header X-Frame-Options         SAMEORIGIN;
    add_header X-Content-Type-Options  nosniff;
    add_header X-XSS-Protection        "1; mode=block";

    # ─── /api/* → FastAPI ────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://api_backend/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # ─── /app/* → Streamlit (WebSocket inclus) ───────────────────────────
    location /app/ {
        proxy_pass         http://frontend_backend/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 86400s;
    }

    # ─── /health → Liveness check NGINX ─────────────────────────────────
    location /health {
        return 200 '{"status":"ok","service":"nginx-gateway"}';
        add_header Content-Type application/json;
    }

    # ─── Racine → redirection vers l'app ─────────────────────────────────
    location / {
        return 302 /app/;
    }
}
